<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>ChatSpark — Talk to Strangers</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HOME SCREEN ===== -->
  <div id="screen-home" class="screen active">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <div class="logo">
      <div class="logo-text"><span class="c">Chat</span><span class="p">Spark</span></div>
      <div class="logo-sub">Talk to strangers who share your interests</div>
    </div>

    <div class="interest-box">
      <label>Add your interests (optional)</label>
      <div class="interest-input-wrap">
        <input type="text" id="interest-input" placeholder="e.g. gaming, music, cricket..." maxlength="30" autocomplete="off" />
        <button class="add-btn" id="add-btn">Add</button>
      </div>
      <div class="tags" id="tags-container">
        <span class="empty-tags">No interests yet — add some above</span>
      </div>
      <div class="suggested-wrap">
        <span class="sug-label">Suggested:</span>
        <div class="suggested-tags" id="suggested-tags"></div>
      </div>
    </div>

    <button class="start-btn" id="start-btn">Find a Stranger →</button>
    <div class="or-divider">or</div>
    <span class="skip-link" id="skip-btn">Skip interests and chat randomly</span>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-n" id="stat-online">—</div>
        <div class="stat-l">online now</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="stat-chatting">—</div>
        <div class="stat-l">chatting</div>
      </div>
      <div class="stat">
        <div class="stat-n">180+</div>
        <div class="stat-l">countries</div>
      </div>
    </div>
  </div>

  <!-- ===== FINDING SCREEN ===== -->
  <div id="screen-finding" class="screen">
    <div class="radar">
      <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
        <circle cx="90" cy="90" r="70" fill="none" stroke="#2A3350" stroke-width="1"/>
        <circle cx="90" cy="90" r="45" fill="none" stroke="#2A3350" stroke-width="1"/>
        <circle cx="90" cy="90" r="20" fill="none" stroke="#2A3350" stroke-width="1"/>
        <circle class="pulse" cx="90" cy="90" r="70" fill="none" stroke="#00D2FF" stroke-width="1.5"/>
        <circle class="pulse pulse2" cx="90" cy="90" r="70" fill="none" stroke="#00D2FF" stroke-width="1.5"/>
        <circle class="pulse pulse3" cx="90" cy="90" r="70" fill="none" stroke="#7B2FFF" stroke-width="1.5"/>
        <g class="spin">
          <line x1="90" y1="90" x2="90" y2="22" stroke="#00D2FF" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
          <path d="M90 90 L153 57 Q155 90 90 90Z" fill="#00D2FF" opacity="0.06"/>
        </g>
        <circle cx="90" cy="90" r="8" fill="#00D2FF" opacity="0.95"/>
        <circle class="blip blip1" cx="122" cy="52" r="4" fill="#7B2FFF"/>
        <circle class="blip blip2" cx="58" cy="122" r="3" fill="#00D2FF"/>
        <circle class="blip blip3" cx="140" cy="105" r="3" fill="#00D2FF"/>
      </svg>
    </div>
    <div class="find-title">Finding your match...</div>
    <div class="find-sub" id="find-sub">Looking for someone with common interests</div>
    <div class="matching-interests" id="matching-interests"></div>
    <button class="cancel-btn" id="cancel-btn">Cancel</button>
  </div>

  <!-- ===== CHAT SCREEN ===== -->
  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <div class="stranger-info">
        <div class="avatar" id="stranger-avatar">?</div>
        <div>
          <div class="stranger-name">Stranger</div>
          <span class="common-badge" id="common-badge"></span>
        </div>
      </div>
      <div class="header-btns">
        <button class="hbtn next" id="next-btn">Next →</button>
        <button class="hbtn end" id="end-btn">Disconnect</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="typing-indicator" id="typing-indicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="chat-input-area">
      <textarea id="msg-input" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
      <button class="send-btn" id="send-btn">&#8593;</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
